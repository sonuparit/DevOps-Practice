apiVersion: v1
kind: Pod
metadata:
  name: sec-pod
spec:
  securityContext:  # This applies to the entire Pod
    runAsUser: 1000 # Optional: specifies the user ID for the container process
    runAsGroup: 3000 # Optional: specifies the primary group ID
    # Files in volumes will be owned by GID 2000
    fsGroup: 2000 # The group ID that Kubernetes will enforce on the volume
    fsGroupChangePolicy: "OnRootMismatch" # The policy to optimize ownership changes
  containers:
  - name: sec-pod
    image: registry.k8s.io/e2e-test-images/agnhost:2.45
    command: ["sh", "-c", "sleep 10"]
    volumeMounts:
    - name: my-volume
      mountPath: /data
  volumes:
    - name: my-volume
      persistentVolumeClaim:
        claimName: my-pvc
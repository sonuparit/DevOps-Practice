# Production-ready reference for Kubernetes taints and tolerations
#
# This file includes examples of:
# - Adding node taints (node-level affinity behavior)
# - Writing pod tolerations (which pods can schedule onto tainted nodes)
# - Common taint keys/values and effect combinations
#
# Use this as a reference when you need to control where pods can be scheduled (e.g., isolating workloads, reserving nodes, or preventing noisy neighbors).

---
# Example 1: Taint a node for "dedicated" workloads (NoSchedule)
# This prevents normal workloads from scheduling onto the node unless they have a matching toleration.
# Apply with: kubectl taint nodes <node-name> dedicated=database:NoSchedule

# Example 2: Taint a node for "critical" maintenance tasks (PreferNoSchedule)
# This prefers to avoid scheduling, but will still schedule if no other nodes are available.
# Apply with: kubectl taint nodes <node-name> maintenance=true:PreferNoSchedule

# Example 3: Taint a node temporarily for draining or upgrades (NoExecute)
# This evicts existing pods that do not tolerate the taint, and prevents new pods from scheduling.
# Apply with: kubectl taint nodes <node-name> upgrade=planned:NoExecute

---
# Pod toleration examples
# Add matching tolerations to pods that are allowed to schedule onto tainted nodes.

apiVersion: v1
kind: Pod
metadata:
  name: example-taint-toleration
  labels:
    app: example
spec:
  containers:
  - name: app
    image: nginx:stable
    ports:
    - containerPort: 80
  tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "database"
    effect: "NoSchedule"

  # This toleration allows the pod to stay on a node that has an upgrade=planned:NoExecute taint.
  # It should only be used when you explicitly want to prevent eviction during an upgrade.
  - key: "upgrade"
    operator: "Equal"
    value: "planned"
    effect: "NoExecute"
    tolerationSeconds: 3600

  # This toleration matches maintenance=true:PreferNoSchedule,
  # allowing the pod to be scheduled if no better nodes are available.
  - key: "maintenance"
    operator: "Equal"
    value: "true"
    effect: "PreferNoSchedule"

---
# Notes / Best practices
# - Use taints to isolate special-purpose nodes (e.g., GPU, storage, security) and keep general workloads off them.
# - Prefer NoSchedule for dedicated node pools and PreferNoSchedule for best-effort/overflow capacity.
# - NoExecute is useful to evict pods quickly (e.g., during maintenance or when a node is unhealthy).
# - Avoid overly broad tolerations (e.g., key: ""), which can defeat the purpose of taints.
# - Ensure your critical system pods (e.g., monitoring, logging) have the needed tolerations to run on control-plane or tainted nodes.
